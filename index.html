<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackle Web</title>
    <style>
        
        @import url('https://fonts.googleapis.com/css2?family=Gluten:wght@100..900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Gluten", cursive;
            font-style: normal;
            background: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            border: 10px solid rgb(0, 0, 0);
            border-radius: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .nav-card {
            background: rgb(255, 255, 255);
            border: 2px solid rgb(0, 0, 0);
            border-radius: 10px;
            padding: 2rem;
            text-decoration: none;
            position: relative;
        }
        
        .footer {
            margin-top: 4rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jackle Web</h1>
        
        <div class="nav-grid">
            <a href="https://qwrench.github.io/NatureSim/index.html" class="nav-card">
                <h2>Nature Simulator</h2>
                <p>A Nature Simulator (WIP)</p>
            </a>
        <div class="footer">
            <p>&copy; 2025 - All Rights reserved.</p>
        </div>
    </div>
</body>
</html>
