<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portlyn - Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(45deg, #64ffda, #1976d2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100, 255, 218, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .nav-card:hover::before {
            left: 100%;
        }

        .nav-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #64ffda;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(100, 255, 218, 0.2);
        }

        .nav-card h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #64ffda;
        }

        .nav-card p {
            color: #b3b3b3;
            line-height: 1.6;
        }

        .footer {
            margin-top: 4rem;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .nav-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Portlyn Hub</h1>
        
        <div class="nav-grid">
            <a href="https://qwrench.github.io/PortlynMC-map/index.html" class="nav-card">
                <h2>PortlynMC - Map</h2>
                <p>The PortlynMC City Map (WIP)</p>
            </a>
            <a href="https://qwrench.github.io/DiscordBot/index.html" class="nav-card">
                <h2>Portlyn - Discord Bot</h2>
                <p>The Portlyn Discord Bot (WIP)</p>
            </a>
        <div class="footer">
            <p>&copy; 2025 - All Rights reserved.</p>
        </div>
    </div>
</body>
</html>
