<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackle Web</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Gluten:wght@100..900&family=Martian+Mono:wght@100..800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Martian Mono", monospace;
            font-style: Regular;
            background: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(45deg, #64ffda, #1976d2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .nav-card h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #64ffda;
        }

        .nav-card p {
            color: #b3b3b3;
            line-height: 1.6;
        }

        .footer {
            margin-top: 4rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jackle Web</h1>
        
        <div class="nav-grid">
            <a href="https://qwrench.github.io/NatureSim/index.html" class="nav-card">
                <h2>Nature Simulator</h2>
                <p>A Nature Simulator (WIP)</p>
            </a>
        <div class="footer">
            <p>&copy; 2025 - All Rights reserved.</p>
        </div>
    </div>
</body>
</html>
