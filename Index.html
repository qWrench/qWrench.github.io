<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portlyn</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Michroma&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Michroma', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        .header {
            height: 300px;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1518709268805-4e9042af2176?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2025&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header-content {
            align-items: center;  
            text-align: center;
            z-index: 10;
        }

        .header-title {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 10px;
        }

        .header-subtitle {
            font-size: 18px;
            color: #cccccc;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        .navbar {
            align-items: center;  
            text-align: center;
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
          text-align: center;
          max-width: 1200px;  
          margin: 0 auto;  
          display: flex;  
          justify-content: center;  
          align-items: center;  
          padding: 0 30px;  
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        .nav-menu a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu a:hover {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            transform: translateY(-2px);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #4CAF50;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-menu a:hover::after {
            width: 80%;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 15px;
            border-radius: 0 10px 10px 0;
            z-index: 999;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin-bottom: 15px;
        }

        .sidebar ul li a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            display: block;
            padding: 8px 12px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .sidebar ul li a:hover {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><defs><pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 100 0 L 0 0 0 100" fill="none" stroke="%23333" stroke-width="2"/></pattern></defs><rect width="1920" height="1080" fill="%23111"/><rect width="1920" height="1080" fill="url(%23grid)"/></svg>');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .hero-content {
            max-width: 800px;
            padding: 0 30px;
        }

        .hero-title {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            line-height: 1.1;
        }

        .hero-title span {
            display: block;
        }

        .version-section {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 50px;
        }

        .version-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            min-width: 280px;
            backdrop-filter: blur(10px);
        }

        .version-card h3 {
            color: #4CAF50;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .version-number {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .version-link {
            color: #4CAF50;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        .version-link:hover {
            color: #66BB6A;
        }

        .cta-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 2px solid;
            min-width: 180px;
            text-align: center;
        }

        .cta-btn.primary {
            background: #4CAF50;
            color: #ffffff;
            border-color: #4CAF50;
        }

        .cta-btn.primary:hover {
            background: #45a049;
            border-color: #45a049;
        }

        .cta-btn.secondary {
            background: transparent;
            color: #4CAF50;
            border-color: #4CAF50;
        }

        .cta-btn.secondary:hover {
            background: #4CAF50;
            color: #ffffff;
        }

        .application-link {
            color: #4CAF50;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        .application-link:hover {
            color: #66BB6A;
        }

        @media (max-width: 768px) {
            .nav-menu {
                flex-wrap: wrap;
                gap: 20px;
            }

            .header {
                height: 250px;
            }

            .header-title {
                font-size: 36px;
            }

            .header-subtitle {
                font-size: 16px;
            }

            .sidebar {
                display: none;
            }

            .hero-title {
                font-size: 48px;
            }

            .version-section {
                flex-direction: column;
                align-items: center;
                gap: 30px;
            }

            .version-card {
                min-width: 250px;
            }

            .cta-section {
                flex-direction: column;
                align-items: center;
            }

            .cta-btn {
                min-width: 200px;
            }
        }

        @media (max-width: 480px) {
            .header-title {
                font-size: 28px;
            }

            .nav-menu {
                flex-direction: column;
                gap: 10px;
            }

            .nav-menu a {
                padding: 8px 15px;
            }

            .hero-title {
                font-size: 36px;
            }

            .version-number {
                font-size: 36px;
            }

            .nav-container {
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>
  
    <nav class="navbar">
        <div class="nav-container">
            <ul class="nav-menu">
                <li><a href="#">Home Page</a></li>
                <li><a href="#">Dynmap</a></a></li>
            </ul>
        </div>
    </nav>
  
    <header class="header">
        <div class="header-content">
            <h1 class="header-title">Portlyn</h1>
        </div>
    </header>

    <section class="hero" style="height: 175px;"></section>
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">
                <span>Information</span>
            </h1>

            <div class="version-section">
                <div class="version-card">
                    <h3>Current Map Release</h3>
                    <div class="version-number">v0.1</div>
                </div>
            </div>

            <div class="cta-section">
                <a href="#" class="cta-btn primary">Download</a>
            </div>
        </div>
    </section>
</body>
</html>
